<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" fill="none">
  <!-- Vectis Mail — Full logo (mark + wordmark) -->
  <!-- Mark: Stylised V formed from two converging lines with an embedded arrow/envelope motif -->
  <defs>
    <linearGradient id="vg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- V mark — envelope chevron with forward motion -->
  <path d="M4 8 L16 26 L28 8" stroke="url(#vg)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 20 L30 14" stroke="#06b6d4" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <!-- Wordmark -->
  <text x="40" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#e6edf3" letter-spacing="-0.5">Vectis</text>
  <text x="120" y="28" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="300" fill="#8b949e" letter-spacing="-0.5">Mail</text>
</svg>
